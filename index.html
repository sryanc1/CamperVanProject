<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Build — Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- FIXED TOP BAR -->
  <div id="auth-bar" class="auth-bar"></div>

  <!-- PAGE HEADER (below auth bar) -->
  <div class="page-header">
    <button id="hamburger" class="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="page-brand">
      <span class="page-brand-icon">🚐</span>
      <span class="page-brand-name">Van Build Planner</span>
    </div>
    <button id="floorplan-btn" class="btn-floorplan" aria-label="Toggle floor plan">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      Floor Plan
    </button>
  </div>

  <!-- FLOOR PLAN DRAWER -->
  <div id="floorplan-drawer" class="floorplan-drawer" aria-hidden="true">
    <div class="floorplan-drawer-inner">
      <img
        src="images/floorplan.jpg"
        alt="Van floor plan"
        class="floorplan-img"
        onerror="this.closest('.floorplan-drawer-inner').classList.add('no-image')"
      />
      <div class="floorplan-no-image-msg">
        <span>📐</span>
        <p>Add your floor plan at <code>images/floorplan.jpg</code></p>
      </div>
    </div>
  </div>

  <!-- SHELL: sidebar + main -->
  <div class="shell">

    <!-- SIDEBAR OVERLAY (mobile backdrop) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- LEFT SIDEBAR -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <p class="sidebar-label">Categories</p>
        <ul id="sidebar-nav" class="sidebar-nav"></ul>
      </div>
      <div class="sidebar-footer">
        <button class="btn-primary sidebar-add-btn" data-action="add-category">+ Add Category</button>
      </div>
    </nav>

    <!-- MAIN: carousel lives here -->
    <main class="main-area">
      <div id="app"></div>
    </main>

  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none;"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
