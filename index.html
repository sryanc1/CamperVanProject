<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Build — Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- FIXED TOP BAR -->
  <div id="auth-bar" class="auth-bar"></div>

  <!-- PAGE HEADER (below auth bar) -->
  <div class="page-header">
    <button id="hamburger" class="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="page-brand">
      <span class="page-brand-icon">🚐</span>
      <span class="page-brand-name">Van Build Planner</span>
    </div>
  </div>

  <!-- SHELL: sidebar + main -->
  <div class="shell">

    <!-- SIDEBAR OVERLAY (mobile backdrop) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- LEFT SIDEBAR -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <p class="sidebar-label">Categories</p>
        <ul id="sidebar-nav" class="sidebar-nav"></ul>
      </div>
      <div class="sidebar-footer">
        <button class="btn-primary sidebar-add-btn" data-action="add-category">+ Add Category</button>
      </div>
    </nav>

    <!-- MAIN: carousel lives here -->
    <main class="main-area">
      <div id="app"></div>
    </main>

  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none;"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
