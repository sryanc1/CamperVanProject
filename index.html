<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Build — Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- AUTH BAR -->
  <div id="auth-bar" class="auth-bar"></div>

  <!-- HERO -->
  <header class="hero">
    <img
      class="hero-img"
      src="https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?w=1400&q=80&fit=crop"
      alt="Van parked in the mountains at sunset"
    />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Build Log</p>
      <h1 class="hero-title">Van Project<br>Budget Planner</h1>
      <p class="hero-sub">Track every component, compare options, stay on budget.</p>
    </div>
  </header>

  <!-- MAIN APP -->
  <main>
    <div id="app"></div>
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none;"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
