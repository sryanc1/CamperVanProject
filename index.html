<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Van Build — Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- FIXED TOP BAR -->
  <div id="auth-bar" class="auth-bar"></div>

  <!-- PAGE HEADER (below auth bar) -->
  <div class="page-header">
    <button id="hamburger" class="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="page-brand">
      <span class="page-brand-icon">🚐</span>
      <span class="page-brand-name">Van Build Planner</span>
    </div>
    <div id="header-total" class="header-total" style="display:none">
      <span class="header-total-label">Estimated</span>
      <span class="header-total-amount">$0.00</span>
    </div>
    <div class="header-budget-wrap" title="Set project budget">
      <span class="header-budget-label">Budget</span>
      <span class="header-budget-prefix">$</span>
      <input id="budget-input" class="header-budget-input" type="number" min="0" step="100" placeholder="0" />
    </div>
    <button id="budget-btn" class="btn-floorplan" aria-label="Toggle budget overview">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span class="btn-floorplan-label">Budget</span>
    </button>
    <button id="floorplan-btn" class="btn-floorplan" aria-label="Toggle floor plan">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <span class="btn-floorplan-label">Floor Plan</span>
    </button>
  </div>

  <!-- FLOOR PLAN DRAWER -->
  <div id="floorplan-drawer" class="floorplan-drawer" aria-hidden="true">
    <div class="floorplan-drawer-inner">
      <img
        src="images/floorplan.jpg"
        alt="Van floor plan"
        class="floorplan-img"
        onerror="this.closest('.floorplan-drawer-inner').classList.add('no-image')"
      />
      <div class="floorplan-no-image-msg">
        <span>📐</span>
        <p>Add your floor plan at <code>images/floorplan.jpg</code></p>
      </div>
    </div>
  </div>

  <!-- BUDGET DRAWER -->
  <div id="budget-drawer" class="floorplan-drawer" aria-hidden="true">
    <div class="budget-drawer-inner">

      <div class="budget-stat-grid">
        <div class="budget-stat">
          <span class="budget-stat-label">Budget</span>
          <span class="budget-stat-amount" id="bd-budget">—</span>
        </div>
        <div class="budget-stat">
          <span class="budget-stat-label">Estimated</span>
          <span class="budget-stat-amount" id="bd-estimated">$0.00</span>
        </div>
        <div class="budget-stat">
          <span class="budget-stat-label">Spent</span>
          <span class="budget-stat-amount" id="bd-spent">$0.00</span>
        </div>
        <div class="budget-stat">
          <span class="budget-stat-label">Remaining</span>
          <span class="budget-stat-amount" id="bd-remaining">—</span>
        </div>
      </div>

      <div class="budget-bars">
        <div class="budget-bar-row">
          <span class="budget-bar-label">Estimated vs Budget</span>
          <div class="budget-bar-track">
            <div class="budget-bar-fill budget-bar-estimated" id="bd-bar-estimated"></div>
          </div>
          <span class="budget-bar-pct" id="bd-pct-estimated">—</span>
        </div>
        <div class="budget-bar-row">
          <span class="budget-bar-label">Spent vs Budget</span>
          <div class="budget-bar-track">
            <div class="budget-bar-fill budget-bar-spent" id="bd-bar-spent"></div>
          </div>
          <span class="budget-bar-pct" id="bd-pct-spent">—</span>
        </div>
      </div>

    </div>
  </div>

  <!-- SHELL: sidebar + main -->
  <div class="shell">

    <!-- SIDEBAR OVERLAY (mobile backdrop) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- LEFT SIDEBAR -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <p class="sidebar-label">Categories</p>
        <ul id="sidebar-nav" class="sidebar-nav"></ul>
      </div>
      <div class="sidebar-footer">
        <div id="sidebar-total" class="sidebar-total" style="display:none">
          <span class="sidebar-total-label">Project Total</span>
          <span class="sidebar-total-amount">$0.00</span>
        </div>
        <button class="btn-primary sidebar-add-btn" data-action="add-category">+ Add Category</button>
      </div>
    </nav>

    <!-- MAIN: carousel lives here -->
    <main class="main-area">
      <div id="app"></div>
    </main>

  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none;"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
